name: Feature request
description: Propose a backend feature or product enhancement.
labels: [needs-triage]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What should be added?
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: Why it matters
      description: Describe the user or system value.
    validations:
      required: true
  - type: textarea
    id: approach
    attributes:
      label: Suggested approach
      description: Optional implementation ideas.
